name: 'Biome Check'

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  biome:
    name: 'Code Quality Check'
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout repository'
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: 'Setup pnpm'
        # pnpm/action-setup@v6
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 10

      - name: 'Setup Node.js'
        # actions/setup-node@v4
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install safe-chain
        run: curl -fsSL https://raw.githubusercontent.com/AikidoSec/safe-chain/6aec1bc4743028a99ab1ebace8e743549260ce82/install-scripts/install-safe-chain.sh | sh -s -- --ci

      - name: 'Install dependencies'
        run: pnpm install --frozen-lockfile

      - name: 'Run Biome linting'
        run: pnpm lint

      - name: 'Run Biome formatting check'
        run: pnpm format

      - name: 'Run Biome comprehensive check'
        run: pnpm check
